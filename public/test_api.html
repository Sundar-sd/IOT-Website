<!DOCTYPE html>
<html>
<head>
  <title>Local API Test Page</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 0 20px;
      background: #0f172a;
      color: #e2e8f0;
    }
    pre {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      border: 1px solid #334155;
      overflow-x: auto;
      font-family: monospace;
      font-size: 14px;
      color: #38bdf8;
    }
    h1 {
      color: #f8fafc;
      font-weight: 700;
      border-bottom: 2px solid #334155;
      padding-bottom: 10px;
    }
    .status-ok { color: #4ade80; }
    .status-err { color: #f87171; }
  </style>
</head>
<body>
  <h1>Local API Proxy Diagnostic</h1>
  <p>This page tests the `/api/products/` endpoint directly from your browser to bypass React bundle caching.</p>
  
  <h3>Diagnostic Results:</h3>
  <pre id="output">Running fetch to /api/products/ ...</pre>

  <script>
    const output = document.getElementById('output');
    
    fetch('/api/products/', {
      headers: {
        'ngrok-skip-browser-warning': '69420'
      }
    })
    .then(async res => {
      const statusText = `Response Status: ${res.status} ${res.statusText}`;
      output.innerHTML = statusText + '\n';
      
      if (res.ok) {
        output.innerHTML += '<span class="status-ok">✔ Connection Successful</span>\n\n';
      } else {
        output.innerHTML += '<span class="status-err">❌ Server Returned Error</span>\n\n';
      }
      
      const contentType = res.headers.get('content-type') || '';
      output.innerHTML += `Content-Type: ${contentType}\n\n`;
      
      const text = await res.text();
      try {
        const json = JSON.parse(text);
        output.innerHTML += 'Parsed JSON Data:\n' + JSON.stringify(json, null, 2);
      } catch (e) {
        output.innerHTML += 'Raw Response Body (not valid JSON):\n' + text;
      }
    })
    .catch(err => {
      output.innerHTML = `<span class="status-err">❌ Fetch Request Failed</span>\n\nError details:\n${err.toString()}`;
    });
  </script>
</body>
</html>
